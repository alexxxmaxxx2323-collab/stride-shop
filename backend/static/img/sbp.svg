<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 132 40" role="img" aria-label="СБП — Система быстрых платежей">
  <!-- фирменная «вертушка» из шести лопастей в спектре -->
  <g transform="translate(20 20)">
    <g transform="rotate(0)"><rect x="5" y="-5.5" width="15" height="11" rx="2.4" fill="#1f8fff"/></g>
    <g transform="rotate(60)"><rect x="5" y="-5.5" width="15" height="11" rx="2.4" fill="#00b3a4"/></g>
    <g transform="rotate(120)"><rect x="5" y="-5.5" width="15" height="11" rx="2.4" fill="#7cc242"/></g>
    <g transform="rotate(180)"><rect x="5" y="-5.5" width="15" height="11" rx="2.4" fill="#ffb000"/></g>
    <g transform="rotate(240)"><rect x="5" y="-5.5" width="15" height="11" rx="2.4" fill="#ff6a00"/></g>
    <g transform="rotate(300)"><rect x="5" y="-5.5" width="15" height="11" rx="2.4" fill="#e91e8c"/></g>
  </g>
  <text x="44" y="26" font-family="Arial, Helvetica, sans-serif" font-size="20" font-weight="800" fill="#1a1a1a" letter-spacing="1">СБП</text>
</svg>
