<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="Cache-Control" content="no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<title>Личный кабинет · STRIDE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { box-sizing: border-box; }
  [hidden] { display: none !important; }
  :root {
    --bg: #0b0b0d; --surface: #151518; --surface-2: #1e1e23;
    --line: rgba(255,255,255,.08); --line-strong: rgba(255,255,255,.18);
    --text: #f3f3f5; --muted: #9a9aa3; --muted-2: #6c6c75;
    --accent: #ccff00; --sale: #ff2e51; --photo: #f2f3f5;
    --r: 16px; --r-sm: 10px;
  }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; font-family: Inter, system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 50% -240px, #1a1a20 0%, var(--bg) 58%) fixed, var(--bg);
    color: var(--text); -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: #000; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 99px; border: 2px solid var(--bg); }
  a { color: inherit; }
  h1,h2,h3 { font-family: "Space Grotesk", Inter, sans-serif; margin: 0; }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 30;
    display: flex; align-items: center; gap: 16px;
    padding: 14px 28px;
    background: rgba(12,12,14,.72); backdrop-filter: saturate(160%) blur(14px);
    border-bottom: 1px solid var(--line);
  }
  .logo { font-family: "Space Grotesk"; font-weight: 700; font-size: 22px; letter-spacing: .04em; text-decoration: none; }
  .logo::after { content: "."; color: var(--accent); }
  .back-link { color: var(--muted); text-decoration: none; font-size: 14px; }
  .back-link:hover { color: var(--text); }
  .h-spacer { flex: 1; }
  .h-user { color: var(--muted); font-size: 14px; }
  .btn {
    font: inherit; cursor: pointer; border-radius: var(--r-sm);
    padding: 9px 16px; border: 1px solid var(--line-strong);
    background: transparent; color: var(--text); transition: .15s;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .btn.primary:hover { filter: brightness(1.08); }
  .btn.primary:disabled { opacity: .5; cursor: default; filter: none; }
  .btn.sm { padding: 6px 12px; font-size: 13px; }
  .btn.danger:hover { border-color: var(--sale); color: var(--sale); }

  /* LAYOUT — широкий шелл, сайдбар прижат к левому краю */
  .wrap { max-width: 1320px; margin: 0 auto; padding: 22px 28px 80px; }
  .layout { display: grid; grid-template-columns: 208px 1fr; gap: 34px; align-items: start; }

  /* NAV */
  .nav { position: sticky; top: 78px; display: flex; flex-direction: column; gap: 2px; }
  .nav-cap { font-size: 11px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted-2); padding: 0 12px 10px; }
  .nav button {
    display: flex; align-items: center; gap: 12px; width: 100%;
    text-align: left; font: inherit; font-size: 14px; cursor: pointer;
    padding: 10px 12px; border: 0; border-radius: var(--r-sm);
    background: transparent; color: var(--muted); transition: .14s; position: relative;
  }
  .nav button .ic { display: inline-flex; align-items: center; justify-content: center; flex: none; }
  .nav svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
  .nav button:hover { background: var(--surface); color: var(--text); }
  .nav button.active { background: var(--surface); color: var(--text); }
  .nav button.active::before { content: ""; position: absolute; left: 0; top: 8px; bottom: 8px; width: 3px; border-radius: 0 3px 3px 0; background: var(--accent); }
  .nav button.active .ic { color: var(--accent); }
  .nav .nav-div { height: 1px; background: var(--line); margin: 10px 8px; }
  .nav .logout { color: var(--muted-2); }
  .nav .logout:hover { color: var(--sale); }

  /* CONTENT */
  .content { min-height: 360px; }
  .card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 22px; }
  .card + .card { margin-top: 18px; }
  .sec-h { font-size: 21px; font-weight: 700; margin-bottom: 4px; }
  .sec-sub { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
  .muted { color: var(--muted); }
  .empty { text-align: center; color: var(--muted); padding: 48px 20px; }

  /* STAT CARDS */
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap: 14px; margin-bottom: 18px; }
  .stat { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r); padding: 18px; }
  .stat .v { font-family: "Space Grotesk"; font-size: 26px; font-weight: 700; }
  .stat .v.accent { color: var(--accent); }
  .stat .k { color: var(--muted); font-size: 13px; margin-top: 2px; }

  .hello { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .avatar {
    width: 56px; height: 56px; border-radius: 50%; flex: none;
    display: grid; place-items: center; font-family: "Space Grotesk"; font-weight: 700; font-size: 22px;
    background: linear-gradient(135deg, var(--accent), #9bd000); color: #000;
  }
  .hello .nm { font-size: 20px; font-weight: 700; font-family: "Space Grotesk"; }
  .hello .em { color: var(--muted); font-size: 14px; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 600; padding: 5px 11px; border-radius: 99px; }
  .badge.ok { background: rgba(204,255,0,.14); color: var(--accent); }
  .badge.warn { background: rgba(255,46,81,.15); color: var(--sale); }

  /* FORMS */
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .field input, .field select {
    width: 100%; padding: 11px 13px; border-radius: var(--r-sm); font: inherit;
    background: var(--surface-2); border: 1px solid var(--line-strong); color: var(--text);
  }
  .field input:focus, .field select:focus { outline: 0; border-color: var(--accent); }
  .field input:read-only { color: var(--muted); }
  .field input.bad { border-color: var(--sale); }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .err { color: var(--sale); font-size: 13px; margin: 6px 0 0; min-height: 17px; }

  /* ORDERS / TX */
  .order { border: 1px solid var(--line); border-radius: var(--r); padding: 16px; margin-bottom: 14px; }
  .order-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; }
  .order-head .id { font-weight: 700; font-family: "Space Grotesk"; }
  .order-head .sum { font-weight: 700; }
  .order-meta { color: var(--muted); font-size: 13px; margin: 6px 0 10px; }
  .order-line { display: flex; gap: 12px; align-items: center; padding: 8px 0; border-top: 1px solid var(--line); }
  .order-line img { width: 52px; height: 52px; object-fit: cover; border-radius: 8px; background: var(--photo); }
  .st { display: inline-block; font-size: 11px; padding: 3px 9px; border-radius: 99px; background: var(--surface-2); color: var(--muted); border: 1px solid var(--line); }
  .st.ok { background: rgba(204,255,0,.14); color: var(--accent); border-color: transparent; }
  .st.bad { background: rgba(255,46,81,.15); color: var(--sale); border-color: transparent; }

  .tx { display: flex; justify-content: space-between; align-items: center; padding: 13px 0; border-bottom: 1px solid var(--line); }
  .tx:last-child { border-bottom: 0; }
  .tx .amt { font-family: "Space Grotesk"; font-weight: 700; }
  .tx .amt.plus { color: var(--accent); }
  .tx .amt.minus { color: var(--sale); }
  .tx .when { color: var(--muted); font-size: 12px; }

  /* PRODUCT GRID */
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 14px; }
  .pcard { background: var(--surface-2); border: 1px solid var(--line); border-radius: var(--r); overflow: hidden; cursor: pointer; transition: .15s; position: relative; }
  .pcard:hover { border-color: var(--accent); transform: translateY(-2px); }
  .pcard .ph { aspect-ratio: 1; background: var(--photo); }
  .pcard .ph img { width: 100%; height: 100%; object-fit: cover; }
  .pcard .pb { padding: 10px 12px 13px; }
  .pcard .pbrand { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; }
  .pcard .pname { font-size: 13px; font-weight: 600; margin: 2px 0 6px; }
  .pcard .pprice { font-weight: 700; }
  .pcard .pold { color: var(--muted-2); text-decoration: line-through; font-size: 12px; margin-left: 6px; }
  .pcard .pfav { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,.5); border: 0; color: #fff; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
  .tag-sale { position: absolute; top: 8px; left: 8px; background: var(--sale); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 7px; border-radius: 6px; }

  /* ADDRESSES */
  .addr { border: 1px solid var(--line); border-radius: var(--r); padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; gap: 14px; }
  .addr .who { font-weight: 600; }
  .addr .det { color: var(--muted); font-size: 13px; margin-top: 3px; }
  .addr-actions { display: flex; flex-direction: column; gap: 6px; flex: none; }

  /* SWITCH */
  .switch-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--line); }
  .switch-row:last-child { border-bottom: 0; }
  .switch-row .sl { font-size: 14px; }
  .switch-row .sd { color: var(--muted); font-size: 12px; margin-top: 2px; }
  .switch { position: relative; width: 46px; height: 26px; flex: none; }
  .switch input { opacity: 0; width: 0; height: 0; }
  .switch .track { position: absolute; inset: 0; background: var(--surface-2); border: 1px solid var(--line-strong); border-radius: 99px; transition: .18s; cursor: pointer; }
  .switch .track::before { content: ""; position: absolute; left: 3px; top: 50%; transform: translateY(-50%); width: 19px; height: 19px; border-radius: 50%; background: var(--muted); transition: .18s; }
  .switch input:checked + .track { background: var(--accent); border-color: var(--accent); }
  .switch input:checked + .track::before { left: 23px; background: #000; }

  /* REFERRAL */
  .ref-code { font-family: "Space Grotesk"; font-size: 32px; font-weight: 700; letter-spacing: .12em; color: var(--accent); }
  .copy-row { display: flex; gap: 8px; margin: 14px 0; }
  .copy-row input { flex: 1; }
  .ref-steps { display: grid; gap: 10px; margin-top: 16px; }
  .ref-step { display: flex; gap: 12px; align-items: flex-start; color: var(--muted); font-size: 14px; }
  .ref-step .n { flex: none; width: 24px; height: 24px; border-radius: 50%; background: var(--surface-2); color: var(--accent); display: grid; place-items: center; font-weight: 700; font-size: 13px; }

  /* TOAST */
  .toast { position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px); opacity: 0; pointer-events: none;
    background: var(--text); color: #000; padding: 12px 22px; border-radius: 99px; font-weight: 600; font-size: 14px; transition: .25s; z-index: 90; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--sale); color: #fff; }

  @media (max-width: 760px) {
    .layout { grid-template-columns: 1fr; }
    .nav { position: static; flex-direction: row; overflow-x: auto; gap: 4px; padding-bottom: 6px; }
    .nav button { white-space: nowrap; }
    .nav button.active::before { left: 8px; right: 8px; top: auto; bottom: 0; width: auto; height: 3px; border-radius: 3px 3px 0 0; }
    .nav .nav-cap, .nav .nav-div, .nav .logout { display: none; }
    .row2 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/static/shop.html">STRIDE</a>
  <a class="back-link" href="/static/shop.html">← в магазин</a>
  <div class="h-spacer"></div>
  <span class="h-user" id="hUser"></span>
</header>

<div class="wrap">
  <div class="layout">
    <nav class="nav" id="nav">
      <div class="nav-cap">Личный кабинет</div>
      <button data-sec="overview"><span class="ic"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></span> Обзор</button>
      <button data-sec="orders"><span class="ic"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="m3.3 7 8.7 5 8.7-5"/><path d="M12 22V12"/></svg></span> Заказы</button>
      <button data-sec="bonuses"><span class="ic"><svg viewBox="0 0 24 24"><polygon points="12 2 15.1 8.6 22 9.3 17 14.1 18.2 21 12 17.7 5.8 21 7 14.1 2 9.3 8.9 8.6 12 2"/></svg></span> Бонусы</button>
      <button data-sec="offers"><span class="ic"><svg viewBox="0 0 24 24"><path d="M20.6 13.4 13.4 20.6a2 2 0 0 1-2.8 0l-7.2-7.2A2 2 0 0 1 2.8 12V4a1 1 0 0 1 1-1H12a2 2 0 0 1 1.4.6l7.2 7.2a2 2 0 0 1 0 2.8z"/><circle cx="7.5" cy="7.5" r="1.3"/></svg></span> Предложения</button>
      <button data-sec="wishlist"><span class="ic"><svg viewBox="0 0 24 24"><path d="M20.8 5.6a5 5 0 0 0-7.1 0L12 7.3l-1.7-1.7a5 5 0 0 0-7.1 7.1l1.7 1.7L12 21.5l7.1-7.1 1.7-1.7a5 5 0 0 0 0-7.1z"/></svg></span> Избранное</button>
      <button data-sec="addresses"><span class="ic"><svg viewBox="0 0 24 24"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0z"/><circle cx="12" cy="10" r="3"/></svg></span> Адреса</button>
      <button data-sec="notifications"><span class="ic"><svg viewBox="0 0 24 24"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/></svg></span> Уведомления</button>
      <button data-sec="referral"><span class="ic"><svg viewBox="0 0 24 24"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> Пригласить друга</button>
      <button data-sec="profile"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 6-6h4a6 6 0 0 1 6 6v1"/></svg></span> Профиль</button>
      <div class="nav-div"></div>
      <button class="logout" id="logoutBtn"><span class="ic"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span> Выйти</button>
    </nav>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "";
const TOKEN_KEY = "stride_token";
const state = { token: localStorage.getItem(TOKEN_KEY), user: null };

// ---------- helpers ----------
async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  if (state.token) headers["Authorization"] = "Bearer " + state.token;
  const r = await fetch(API + path, { ...opts, headers });
  const text = await r.text();
  const body = text ? JSON.parse(text) : null;
  if (!r.ok) throw { status: r.status, body };
  return body;
}
const fmt = n => (n ?? 0).toLocaleString("ru-RU") + " ₽";
const pts = n => (n ?? 0).toLocaleString("ru-RU") + " Б";
const esc = s => (s == null ? "" : String(s)).replace(/[&<>"]/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
const dt = s => { try { return new Date(s).toLocaleDateString("ru-RU", { day:"numeric", month:"long", year:"numeric" }); } catch { return ""; } };
const dtt = s => { try { return new Date(s).toLocaleString("ru-RU", { day:"numeric", month:"short", hour:"2-digit", minute:"2-digit" }); } catch { return ""; } };
function toast(msg, err = false) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.toggle("error", err); t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}
function errMsg(e, fallback) {
  const d = e && e.body && e.body.detail;
  if (typeof d === "string") return d;
  if (Array.isArray(d) && d[0] && d[0].msg) return d[0].msg;
  return fallback || "Что-то пошло не так";
}
// Маска телефона: любой ввод приводим к +7 (9XX) XXX-XX-XX.
function maskPhone(el) {
  if (!el) return;
  const fmt = () => {
    let d = el.value.replace(/\D/g, "");
    if (d.startsWith("8")) d = "7" + d.slice(1);
    if (!d.startsWith("7")) d = "7" + d;
    d = d.slice(0, 11);
    let out = "+7";
    if (d.length > 1) out += " (" + d.slice(1, 4);
    if (d.length >= 4) out += ") " + d.slice(4, 7);
    if (d.length >= 7) out += "-" + d.slice(7, 9);
    if (d.length >= 9) out += "-" + d.slice(9, 11);
    el.value = out;
  };
  el.addEventListener("input", fmt);
  el.addEventListener("focus", () => { if (!el.value) el.value = "+7 "; });
}
// Статусы исполнения заказа (как у Ozon/WB/Lamoda) и статусы оплаты — две оси.
const ORDER_STATUS = {
  pending: "В обработке", assembling: "Собирается", shipped: "Передан в доставку",
  in_transit: "В пути", ready_for_pickup: "Готов к выдаче", delivered: "Доставлен",
  delivery_failed: "Ошибка доставки", cancelled: "Отменён", returned: "Возврат",
};
const PAYMENT_STATUS = {
  awaiting: "Ожидает оплаты", paid: "Оплачен", cod: "Оплата при получении", refunded: "Возврат оформлен",
};
// Покупатель может отменить, пока заказ не передан в доставку.
const CANCELLABLE = new Set(["pending", "assembling"]);
function statusClass(s) {
  if (s === "delivered") return "ok";
  if (s === "cancelled" || s === "delivery_failed" || s === "returned") return "bad";
  return "";
}

// ---------- boot ----------
async function boot() {
  if (!state.token) { location.href = "/static/shop.html"; return; }
  try {
    state.user = await api("/auth/me");
  } catch {
    localStorage.removeItem(TOKEN_KEY);
    location.href = "/static/shop.html";
    return;
  }
  const u = state.user;
  document.getElementById("hUser").textContent = u.email || u.first_name || "Вы";
  const sec = (location.hash || "#overview").slice(1);
  setSection(SECTIONS[sec] ? sec : "overview");
}

document.getElementById("logoutBtn").onclick = () => {
  localStorage.removeItem(TOKEN_KEY);
  location.href = "/static/shop.html";
};

document.getElementById("nav").addEventListener("click", e => {
  const b = e.target.closest("[data-sec]");
  if (b) setSection(b.dataset.sec);
});
window.addEventListener("hashchange", () => {
  const sec = (location.hash || "#overview").slice(1);
  if (SECTIONS[sec]) setSection(sec);
});

function setSection(sec) {
  location.hash = sec;
  document.querySelectorAll("#nav button[data-sec]").forEach(b => b.classList.toggle("active", b.dataset.sec === sec));
  const el = document.getElementById("content");
  el.innerHTML = '<div class="empty">Загрузка…</div>';
  SECTIONS[sec]().catch(e => { el.innerHTML = `<div class="card"><div class="empty">Не удалось загрузить раздел</div></div>`; console.error(e); });
}

// ---------- sections ----------
const SECTIONS = {
  async overview() {
    const s = await api("/me/summary");
    const u = state.user;
    const initials = ((u.first_name || u.email || "?")[0] + (u.last_name ? u.last_name[0] : "")).toUpperCase();
    const verify = s.email
      ? (s.email_verified
        ? '<span class="badge ok">✓ E-mail подтверждён</span>'
        : `<span class="badge warn">⚠ E-mail не подтверждён</span> <button class="btn sm" id="resendBtn" style="margin-left:8px">Выслать письмо</button>`)
      : "";
    document.getElementById("content").innerHTML = `
      <div class="card">
        <div class="hello">
          <div class="avatar">${esc(initials)}</div>
          <div>
            <div class="nm">${esc([u.first_name,u.last_name].filter(Boolean).join(" ") || "Профиль")}</div>
            <div class="em">${esc(s.email || "без e-mail")} · с нами с ${dt(s.member_since)}</div>
          </div>
        </div>
        <div>${verify}</div>
      </div>
      <div class="stats" style="margin-top:18px">
        <div class="stat"><div class="v">${s.orders_count}</div><div class="k">заказов оформлено</div></div>
        <div class="stat"><div class="v accent">${pts(s.bonus_balance)}</div><div class="k">бонусных баллов</div></div>
        <div class="stat"><div class="v">${fmt(s.total_spent)}</div><div class="k">сумма покупок</div></div>
        <div class="stat"><div class="v">${s.preferred_size || "—"}</div><div class="k">мой размер</div></div>
      </div>
      <div class="card">
        <div class="sec-h" style="font-size:17px">Быстрые действия</div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:12px">
          <button class="btn" onclick="setSection('orders')">Мои заказы</button>
          <button class="btn" onclick="setSection('offers')">Предложения для меня</button>
          <button class="btn" onclick="setSection('referral')">Пригласить друга</button>
          <a class="btn" href="/static/shop.html" style="text-decoration:none">За покупками →</a>
        </div>
      </div>`;
    const rb = document.getElementById("resendBtn");
    if (rb) rb.onclick = async () => {
      rb.disabled = true; rb.textContent = "Отправляем…";
      try { state.user = await api("/auth/resend-verification", { method: "POST" }); toast("Письмо отправлено — проверьте почту"); }
      catch (e) { toast(errMsg(e, "Не удалось отправить"), true); rb.disabled = false; rb.textContent = "Выслать письмо"; }
    };
  },

  async orders() {
    const list = await api("/orders");
    if (!list.length) { card('<div class="empty">Заказов ещё нет.<br><a class="btn" style="margin-top:14px;text-decoration:none" href="/static/shop.html">За покупками →</a></div>'); return; }
    document.getElementById("content").innerHTML = `
      <div class="card"><div class="sec-h">Мои заказы</div><div class="sec-sub">История заказов и покупок</div>
      ${list.map(o => `
        <div class="order">
          <div class="order-head"><span class="id">Заказ №${o.id}</span><span class="sum">${fmt(o.total_amount)}</span></div>
          <div class="order-meta">
            <span class="st ${statusClass(o.status)}">${ORDER_STATUS[o.status] || o.status}</span>
            <span class="st">${PAYMENT_STATUS[o.payment_status] || o.payment_status}</span>
            · ${dtt(o.created_at)} · ${o.delivery_type === "pickup" ? "самовывоз" : "курьер"}
          </div>
          ${o.items.map(i => `
            <div class="order-line">
              <img src="${esc(i.product_image)}" alt="">
              <div style="flex:1"><div>${esc(i.product_name)}</div><div class="muted" style="font-size:13px">${esc(i.color_name)} · р. ${i.size} · ${i.quantity} шт.</div></div>
              <div>${fmt(i.subtotal)}</div>
            </div>`).join("")}
          ${CANCELLABLE.has(o.status)
            ? `<div style="margin-top:12px"><button class="btn sm danger" data-cancel="${o.id}">Отменить заказ</button></div>`
            : ""}
        </div>`).join("")}
      </div>`;
    document.getElementById("content").querySelectorAll("[data-cancel]").forEach(b =>
      b.onclick = () => cancelOrder(+b.dataset.cancel));
  },

  async bonuses() {
    const b = await api("/me/bonuses");
    const txs = b.transactions;
    document.getElementById("content").innerHTML = `
      <div class="card" style="text-align:center">
        <div class="muted" style="font-size:13px">Бонусный баланс</div>
        <div class="ref-code" style="font-size:40px;letter-spacing:0;margin:6px 0">${pts(b.balance)}</div>
        <div class="muted" style="font-size:13px">${b.cashback_pct}% от каждого заказа возвращается баллами</div>
      </div>
      <div class="card">
        <div class="sec-h" style="font-size:17px">История начислений</div>
        ${txs.length ? txs.map(t => `
          <div class="tx">
            <div><div>${esc(t.reason)}</div><div class="when">${dtt(t.created_at)}</div></div>
            <div class="amt ${t.amount >= 0 ? "plus" : "minus"}">${t.amount >= 0 ? "+" : ""}${pts(t.amount)}</div>
          </div>`).join("") : '<div class="empty">Пока пусто. Бонусы начисляются за заказы.</div>'}
      </div>`;
  },

  async offers() {
    const o = await api("/me/offers");
    document.getElementById("content").innerHTML = `
      <div class="card">
        <div class="sec-h">Предложения для вас</div><div class="sec-sub">${esc(o.reason)}</div>
        ${o.products.length ? `<div class="pgrid">${o.products.map(productCard).join("")}</div>` : '<div class="empty">Пока нет персональных предложений</div>'}
      </div>`;
  },

  async wishlist() {
    const favs = await api("/favorites");
    const sizes = [];
    for (let s = 35; s <= 47; s++) sizes.push(s);
    document.getElementById("content").innerHTML = `
      <div class="card">
        <div class="sec-h" style="font-size:17px">Мой размер</div>
        <div class="sec-sub">Ваш размер обуви для быстрого подбора</div>
        <div style="display:flex;gap:10px;align-items:flex-end;max-width:280px">
          <div class="field" style="flex:1;margin:0"><label>Размер обуви (RU)</label>
            <select id="sizeSel"><option value="">Не выбран</option>${sizes.map(s => `<option value="${s}" ${state.user.preferred_size === s ? "selected" : ""}>${s}</option>`).join("")}</select>
          </div>
          <button class="btn primary" id="sizeSave">Сохранить</button>
        </div>
      </div>
      <div class="card">
        <div class="sec-h" style="font-size:17px">Избранное</div>
        <div class="sec-sub">${favs.length} товар(ов)</div>
        ${favs.length ? `<div class="pgrid">${favs.map(p => productCard(p, true)).join("")}</div>` : '<div class="empty">В избранном пусто — добавьте товары сердечком в каталоге</div>'}
      </div>`;
    document.getElementById("sizeSave").onclick = async () => {
      const v = document.getElementById("sizeSel").value;
      try {
        state.user = await api("/auth/me", { method: "PATCH", body: JSON.stringify({ preferred_size: v ? +v : null }) });
        toast("Размер сохранён");
      } catch (e) { toast(errMsg(e, "Не удалось сохранить"), true); }
    };
  },

  async addresses() {
    const list = await api("/me/addresses");
    document.getElementById("content").innerHTML = `
      <div class="card">
        <div class="sec-h">Адреса доставки</div><div class="sec-sub">Сохранённые адреса доставки в одном месте</div>
        <div id="addrList">${list.map(addrRow).join("") || '<div class="empty">Пока нет сохранённых адресов</div>'}</div>
      </div>
      <div class="card">
        <div class="sec-h" style="font-size:17px">Добавить адрес</div>
        <div class="row2" style="margin-top:14px">
          <div class="field"><label>Получатель</label><input id="aRecipient" placeholder="Имя Фамилия"></div>
          <div class="field"><label>Телефон</label><input id="aPhone" placeholder="+7 9XX XXX-XX-XX"></div>
        </div>
        <div class="field"><label>Адрес</label><input id="aAddr" placeholder="Город, улица, дом, квартира"></div>
        <label style="display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted);margin-bottom:12px"><input type="checkbox" id="aDefault"> Сделать адресом по умолчанию</label>
        <div class="err" id="aErr"></div>
        <button class="btn primary" id="aSave">Добавить адрес</button>
      </div>`;
    maskPhone(document.getElementById("aPhone"));
    document.getElementById("aSave").onclick = addAddress;
    document.getElementById("addrList").addEventListener("click", e => {
      const del = e.target.closest("[data-del]");
      if (del) deleteAddress(+del.dataset.del);
      const def = e.target.closest("[data-def]");
      if (def) makeDefault(+def.dataset.def);
    });
  },

  async notifications() {
    const u = state.user;
    document.getElementById("content").innerHTML = `
      <div class="card">
        <div class="sec-h">Уведомления</div><div class="sec-sub">Как с вами связываться</div>
        <div class="switch-row">
          <div><div class="sl">E-mail — заказы и скидки</div><div class="sd">Статусы заказов и персональные акции на почту</div></div>
          <label class="switch"><input type="checkbox" id="swEmail" ${u.marketing_consent ? "checked" : ""}><span class="track"></span></label>
        </div>
        <div class="switch-row">
          <div><div class="sl">SMS — подтверждение заказа</div><div class="sd">Короткие уведомления о статусе по телефону</div></div>
          <label class="switch"><input type="checkbox" id="swSms" ${u.sms_consent ? "checked" : ""}><span class="track"></span></label>
        </div>
      </div>`;
    const save = async (patch, ok) => {
      try { state.user = await api("/auth/me", { method: "PATCH", body: JSON.stringify(patch) }); toast(ok); }
      catch (e) { toast(errMsg(e, "Не удалось сохранить"), true); }
    };
    document.getElementById("swEmail").onchange = e => save({ marketing_consent: e.target.checked }, "Настройки сохранены");
    document.getElementById("swSms").onchange = e => save({ sms_consent: e.target.checked }, "Настройки сохранены");
  },

  async referral() {
    const r = await api("/me/referral");
    // Ссылку строим от текущего адреса магазина, а не от site_url из конфига
    // (на локалке он указывает на другой порт → битая ссылка).
    const link = location.origin + "/static/shop.html?ref=" + r.code;
    document.getElementById("content").innerHTML = `
      <div class="card" style="text-align:center">
        <div class="muted" style="font-size:13px">Ваш реферальный код</div>
        <div class="ref-code">${esc(r.code)}</div>
        <div class="copy-row" style="max-width:480px;margin:16px auto 0">
          <input class="field" id="refLink" readonly value="${esc(link)}" style="background:var(--surface-2);border:1px solid var(--line-strong);border-radius:var(--r-sm);color:var(--text);padding:11px 13px">
          <button class="btn primary" id="copyBtn">Копировать</button>
        </div>
      </div>
      <div class="stats">
        <div class="stat"><div class="v accent">${r.invited_count}</div><div class="k">друзей приглашено</div></div>
        <div class="stat"><div class="v accent">${pts(r.earned)}</div><div class="k">заработано на рефералах</div></div>
      </div>
      <div class="card">
        <div class="sec-h" style="font-size:17px">Как это работает</div>
        <div class="ref-steps">
          <div class="ref-step"><span class="n">1</span><div>Отправьте другу свою ссылку или код <b style="color:var(--text)">${esc(r.code)}</b>.</div></div>
          <div class="ref-step"><span class="n">2</span><div>Друг регистрируется по ней и получает <b style="color:var(--accent)">${pts(r.referred_bonus)}</b> на первый заказ.</div></div>
          <div class="ref-step"><span class="n">3</span><div>Вам начисляется <b style="color:var(--accent)">${pts(r.referrer_bonus)}</b> за каждого приглашённого друга.</div></div>
        </div>
      </div>`;
    document.getElementById("copyBtn").onclick = async () => {
      try { await navigator.clipboard.writeText(link); toast("Ссылка скопирована"); }
      catch { const i = document.getElementById("refLink"); i.select(); document.execCommand("copy"); toast("Ссылка скопирована"); }
    };
  },

  async profile() {
    const u = state.user;
    const verify = u.email
      ? (u.email_verified ? '<span class="badge ok">✓ подтверждён</span>' : '<span class="badge warn">⚠ не подтверждён</span>')
      : "";
    document.getElementById("content").innerHTML = `
      <div class="card">
        <div class="sec-h">Личные данные</div><div class="sec-sub">Имя, контакты и e-mail</div>
        <div class="row2">
          <div class="field"><label>Имя</label><input id="pFirst" value="${esc(u.first_name)}"></div>
          <div class="field"><label>Фамилия</label><input id="pLast" value="${esc(u.last_name)}"></div>
        </div>
        <div class="field"><label>Телефон</label><input id="pPhone" value="${esc(u.phone)}" placeholder="+7 9XX XXX-XX-XX"></div>
        <div class="field"><label>E-mail ${verify}</label><input value="${esc(u.email)}" readonly></div>
        <div class="err" id="pErr"></div>
        <button class="btn primary" id="pSave">Сохранить</button>
      </div>
      <div class="card">
        <div class="sec-h" style="font-size:17px">Смена пароля</div>
        <div class="sec-sub">${u.password_set === false ? "" : "Введите текущий и новый пароль"}</div>
        <div class="field"><label>Текущий пароль</label><input id="cwCur" type="password" autocomplete="current-password"></div>
        <div class="row2">
          <div class="field"><label>Новый пароль (мин. 8)</label><input id="cwNew" type="password" autocomplete="new-password"></div>
          <div class="field"><label>Повторите</label><input id="cwNew2" type="password" autocomplete="new-password"></div>
        </div>
        <div class="err" id="cwErr"></div>
        <button class="btn primary" id="cwSave">Изменить пароль</button>
      </div>`;
    document.getElementById("pSave").onclick = saveProfile;
    document.getElementById("cwSave").onclick = changePassword;
  },
};

// ---------- shared bits ----------
function card(html) { document.getElementById("content").innerHTML = `<div class="card">${html}</div>`; }

function productCard(p, fav = false) {
  const img = p.primary_image || "/static/products/_placeholder.png";
  const old = p.price_old ? `<span class="pold">${fmt(p.price_old)}</span>` : "";
  const sale = p.discount_pct ? `<span class="tag-sale">−${p.discount_pct}%</span>` : "";
  const favBtn = fav ? `<button class="pfav" data-unfav="${p.id}" title="Убрать">×</button>` : "";
  return `
    <div class="pcard" onclick="location.href='/static/shop.html'">
      <div class="ph">${sale}${favBtn}<img src="${esc(img)}" alt="${esc(p.name)}"></div>
      <div class="pb">
        <div class="pbrand">${esc(p.brand && p.brand.name)}</div>
        <div class="pname">${esc(p.name)}</div>
        <div><span class="pprice">${fmt(p.price)}</span>${old}</div>
      </div>
    </div>`;
}
// делегирование «убрать из избранного»
document.getElementById("content").addEventListener("click", async e => {
  const un = e.target.closest("[data-unfav]");
  if (!un) return;
  e.stopPropagation();
  try { await api(`/favorites/${un.dataset.unfav}`, { method: "DELETE" }); toast("Убрано из избранного"); SECTIONS.wishlist(); }
  catch (err) { toast(errMsg(err, "Ошибка"), true); }
});

function addrRow(a) {
  return `
    <div class="addr">
      <div>
        <div class="who">${esc(a.recipient)} ${a.is_default ? '<span class="badge ok" style="margin-left:6px">по умолчанию</span>' : ""}</div>
        <div class="det">${esc(a.full_address)}</div>
        <div class="det">${esc(a.phone)}</div>
      </div>
      <div class="addr-actions">
        ${a.is_default ? "" : `<button class="btn sm" data-def="${a.id}">Сделать основным</button>`}
        <button class="btn sm danger" data-del="${a.id}">Удалить</button>
      </div>
    </div>`;
}

async function addAddress() {
  const err = document.getElementById("aErr"); err.textContent = "";
  const payload = {
    recipient: document.getElementById("aRecipient").value.trim(),
    phone: document.getElementById("aPhone").value.trim(),
    full_address: document.getElementById("aAddr").value.trim(),
    is_default: document.getElementById("aDefault").checked,
  };
  if (!payload.recipient || !payload.phone || !payload.full_address) { err.textContent = "Заполните все поля"; return; }
  try { await api("/me/addresses", { method: "POST", body: JSON.stringify(payload) }); toast("Адрес добавлен"); SECTIONS.addresses(); }
  catch (e) { err.textContent = errMsg(e, "Не удалось добавить адрес"); }
}
async function deleteAddress(id) {
  try { await api(`/me/addresses/${id}`, { method: "DELETE" }); toast("Адрес удалён"); SECTIONS.addresses(); }
  catch (e) { toast(errMsg(e, "Ошибка"), true); }
}
async function makeDefault(id) {
  const list = await api("/me/addresses");
  const a = list.find(x => x.id === id);
  if (!a) return;
  try {
    await api(`/me/addresses/${id}`, { method: "PUT", body: JSON.stringify({ recipient: a.recipient, phone: a.phone, full_address: a.full_address, is_default: true }) });
    toast("Адрес по умолчанию обновлён"); SECTIONS.addresses();
  } catch (e) { toast(errMsg(e, "Ошибка"), true); }
}

async function saveProfile() {
  const err = document.getElementById("pErr"); err.textContent = "";
  const payload = {
    first_name: document.getElementById("pFirst").value.trim() || null,
    last_name: document.getElementById("pLast").value.trim() || null,
    phone: document.getElementById("pPhone").value.trim() || null,
  };
  try { state.user = await api("/auth/me", { method: "PATCH", body: JSON.stringify(payload) }); toast("Профиль сохранён"); document.getElementById("hUser").textContent = state.user.email || state.user.first_name; }
  catch (e) { err.textContent = errMsg(e, "Не удалось сохранить"); }
}

async function changePassword() {
  const err = document.getElementById("cwErr"); err.textContent = "";
  const cur = document.getElementById("cwCur").value;
  const nw = document.getElementById("cwNew").value;
  const nw2 = document.getElementById("cwNew2").value;
  if (nw.length < 8) { err.textContent = "Новый пароль — минимум 8 символов"; return; }
  if (nw !== nw2) { err.textContent = "Пароли не совпадают"; return; }
  try {
    await api("/auth/change-password", { method: "POST", body: JSON.stringify({ current_password: cur, new_password: nw }) });
    toast("Пароль изменён");
    document.getElementById("cwCur").value = document.getElementById("cwNew").value = document.getElementById("cwNew2").value = "";
  } catch (e) { err.textContent = errMsg(e, "Не удалось изменить пароль"); }
}

async function cancelOrder(id) {
  if (!confirm(`Отменить заказ №${id}? Списанные баллы вернутся, начисленный кэшбэк будет снят.`)) return;
  try {
    await api(`/orders/${id}/cancel`, { method: "POST" });
    toast("Заказ отменён");
    SECTIONS.orders();
  } catch (e) { toast(errMsg(e, "Не удалось отменить заказ"), true); }
}

boot();
</script>
</body>
</html>
