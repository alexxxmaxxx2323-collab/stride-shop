<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>STRIDE · оплата</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; margin: 0; background: #fafafa; color: #16161a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .wrap { max-width: 760px; width: 100%; display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 720px) { .wrap { grid-template-columns: 1fr; } }
  .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,.06); padding: 24px; }
  h1 { margin: 0 0 18px; font-size: 22px; letter-spacing: -0.02em; }
  .pay-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -.02em; }
  .test-badge { background: #ffeaa7; color: #5a4500; font-size: 11px; font-weight: 700; padding: 4px 8px; border-radius: 4px; }

  .summary-line { display: flex; gap: 10px; padding: 10px 0; border-bottom: 1px solid #f3f3f3; font-size: 13px; }
  .summary-line:last-child { border: 0; }
  .summary-line img { width: 50px; height: 50px; object-fit: contain; background: #fafafa; border-radius: 4px; }
  .summary-line .info { flex: 1; }
  .summary-line .sm { color: #888; font-size: 12px; }
  .summary-line .pr { text-align: right; font-weight: 600; }
  .total { display: flex; justify-content: space-between; font-size: 18px; font-weight: 700; padding: 14px 0 0; border-top: 2px solid #16161a; margin-top: 8px; }
  .delivery { background: #f9f9f9; border-radius: 8px; padding: 12px; margin-top: 14px; font-size: 13px; }
  .delivery strong { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.04em; }

  .form-row { margin-bottom: 12px; }
  label { display: block; font-size: 12px; color: #555; margin-bottom: 4px; }
  input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
  input:disabled { background: #f9f9f9; color: #555; }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .pay-btn { width: 100%; padding: 14px; background: #16161a; color: #fff; border: 0; border-radius: 8px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .pay-btn:hover { background: #000; }
  .pay-btn:disabled { background: #ccc; }
  .hint { font-size: 12px; color: #888; margin-top: 14px; text-align: center; }
  .success { text-align: center; padding: 30px 20px; }
  .success .check { font-size: 56px; color: #28a745; margin-bottom: 14px; }
  .success h2 { margin: 0 0 8px; }
  .success p { color: #555; margin: 0 0 18px; }
  .btn-row { display: flex; gap: 8px; }
  .btn { flex: 1; text-align: center; padding: 10px; background: #f1f1f1; border: 0; border-radius: 8px; text-decoration: none; color: inherit; font-size: 14px; }
  .btn.primary { background: #16161a; color: #fff; }
  .error { color: #f5163f; font-size: 13px; margin-top: 8px; text-align: center; }
</style>
</head>
<body>
<div class="wrap" id="wrap"><div class="card" style="grid-column:1/-1;text-align:center;color:#888">Загрузка...</div></div>

<script>
const params = new URLSearchParams(location.search);
const orderId = parseInt(params.get("order"), 10);
const token = localStorage.getItem("stride_token");
const fmt = n => n.toLocaleString("ru-RU") + " ₽";

async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  if (token) headers["Authorization"] = "Bearer " + token;
  const r = await fetch(path, { ...opts, headers });
  const text = await r.text();
  const body = text ? JSON.parse(text) : null;
  if (!r.ok) throw { status: r.status, body };
  return body;
}

async function init() {
  if (!orderId || !token) {
    document.getElementById("wrap").innerHTML = `<div class="card" style="grid-column:1/-1"><div class="error">Нет токена или не указан order. Войди на <a href="/static/shop.html">главной</a>.</div></div>`;
    return;
  }

  let order;
  try {
    order = await api("/orders/" + orderId);
  } catch (e) {
    document.getElementById("wrap").innerHTML = `<div class="card" style="grid-column:1/-1"><div class="error">Заказ #${orderId} не найден</div></div>`;
    return;
  }

  if (order.payment_status === "paid") {
    renderSuccess(order);
    return;
  }
  renderForm(order);
}

function renderForm(order) {
  document.getElementById("wrap").innerHTML = `
    <div class="card">
      <h1>Заказ #${order.id}</h1>
      ${order.items.map(i => `
        <div class="summary-line">
          <img src="${i.product_image}" alt="">
          <div class="info"><div>${i.product_name}</div><div class="sm">${i.color_name ? i.color_name + " · " : ""}размер ${i.size} · ${fmt(i.unit_price)} × ${i.quantity}</div></div>
          <div class="pr">${fmt(i.subtotal)}</div>
        </div>
      `).join("")}
      <div class="total"><span>Итого</span><span>${fmt(order.total_amount)}</span></div>
      <div class="delivery">
        <strong>Доставка</strong><br>
        ${order.delivery_name}<br>
        ${order.delivery_phone}<br>
        ${order.delivery_address}
      </div>
    </div>

    <div class="card">
      <div class="pay-head"><div class="logo">Оплата картой</div><span class="test-badge">ТЕСТОВЫЙ РЕЖИМ</span></div>
      <div class="form-row">
        <label>Номер карты</label>
        <input value="4444 4444 4444 4444" disabled>
      </div>
      <div class="two-col">
        <div class="form-row"><label>Срок</label><input value="12 / 29" disabled></div>
        <div class="form-row"><label>CVC</label><input value="123" disabled></div>
      </div>
      <div class="form-row"><label>Имя на карте</label><input value="${order.delivery_name.toUpperCase()}" disabled></div>
      <button class="pay-btn" id="payBtn">Оплатить ${fmt(order.total_amount)}</button>
      <div class="hint">Это тестовая страница — реальные деньги не списываются.<br>Карта-пустышка прошита в полях.</div>
      <div class="error" id="payError"></div>
    </div>
  `;
  document.getElementById("payBtn").onclick = async () => {
    const btn = document.getElementById("payBtn");
    btn.disabled = true;
    btn.textContent = "Обработка...";
    try {
      await api("/payments/mock", { method: "POST", body: JSON.stringify({ order_id: order.id }) });
      const updated = await api("/orders/" + order.id);
      renderSuccess(updated);
    } catch (e) {
      document.getElementById("payError").textContent = (e.body && e.body.detail) || "Ошибка";
      btn.disabled = false;
      btn.textContent = `Оплатить ${fmt(order.total_amount)}`;
    }
  };
}

function renderSuccess(order) {
  document.getElementById("wrap").innerHTML = `
    <div class="card" style="grid-column:1/-1">
      <div class="success">
        <div class="check">✓</div>
        <h2>Заказ #${order.id} оплачен</h2>
        <p>Сумма: ${fmt(order.total_amount)} · доставка по адресу ${order.delivery_address}</p>
        <div class="btn-row">
          <a class="btn primary" href="/static/shop.html">← В каталог</a>
          <a class="btn" href="/static/shop.html?orders=1">Мои заказы</a>
        </div>
      </div>
    </div>
  `;
}

init();
</script>
</body>
</html>
