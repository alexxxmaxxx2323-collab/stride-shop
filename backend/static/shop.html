<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>STRIDE · кроссовки, кеды, ботинки</title>
<style>
  *,*::before,*::after { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", system-ui, sans-serif; margin: 0; background: #fafafa; color: #16161a; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; }

  /* ---- HEADER ---- */
  header { position: sticky; top: 0; z-index: 20; background: #fff; border-bottom: 1px solid #eee; }
  .topbar { display: flex; align-items: center; gap: 24px; padding: 14px 32px; }
  .logo { font-size: 22px; font-weight: 800; letter-spacing: -0.03em; }
  .search { flex: 1; max-width: 520px; padding: 9px 14px; background: #f3f3f3; border: 0; border-radius: 8px; font-size: 14px; }
  .top-actions { display: flex; gap: 8px; align-items: center; }
  .btn { padding: 8px 14px; border-radius: 8px; border: 0; font-size: 14px; background: #f1f1f1; }
  .btn:hover { background: #e7e7e7; }
  .btn.primary { background: #16161a; color: #fff; }
  .btn.primary:hover { background: #000; }
  .btn.sale { background: #f5163f; color: #fff; }
  .cart-btn { position: relative; }
  .cart-badge { position: absolute; top: -4px; right: -4px; background: #f5163f; color: #fff; font-size: 11px; font-weight: 700; min-width: 18px; height: 18px; border-radius: 99px; display: grid; place-items: center; padding: 0 4px; }
  .tabs { display: flex; gap: 4px; padding: 0 32px 12px; flex-wrap: wrap; }
  .tab { padding: 8px 14px; border-radius: 999px; background: transparent; border: 0; font-size: 14px; color: #555; }
  .tab:hover { background: #f1f1f1; }
  .tab.active { background: #16161a; color: #fff; }
  .tab.sale-tab.active { background: #f5163f; }

  /* ---- MAIN ---- */
  main { padding: 24px 32px 80px; }
  .meta { margin-bottom: 16px; color: #888; font-size: 13px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 18px; }
  .card { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 2px rgba(0,0,0,.05); display: flex; flex-direction: column; transition: transform .12s; }
  .card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,.08); }
  .thumb { position: relative; aspect-ratio: 1/1; background: #fff; padding: 12px; }
  .thumb img { width: 100%; height: 100%; object-fit: contain; }
  .disc { position: absolute; top: 10px; left: 10px; background: #f5163f; color: #fff; font-weight: 700; font-size: 14px; padding: 4px 9px; border-radius: 6px; }
  .body { padding: 12px 14px 14px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .brand { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: .05em; }
  .name { font-weight: 600; font-size: 15px; min-height: 36px; }
  .price-row { display: flex; align-items: baseline; gap: 8px; margin-top: auto; }
  .price { font-weight: 700; font-size: 17px; }
  .price.sale-price { color: #f5163f; }
  .price-old { color: #aaa; text-decoration: line-through; font-size: 13px; }
  .rating { color: #888; font-size: 12px; }
  .sizes { display: flex; gap: 4px; flex-wrap: wrap; margin: 6px 0 8px; }
  .size-chip { padding: 4px 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; background: #fff; min-width: 32px; text-align: center; }
  .size-chip:hover { border-color: #16161a; }
  .size-chip.active { background: #16161a; color: #fff; border-color: #16161a; }
  .add-btn { background: #16161a; color: #fff; border: 0; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 600; }
  .add-btn:disabled { background: #ccc; cursor: not-allowed; }

  /* ---- OVERLAY + PANELS ---- */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 50; opacity: 0; pointer-events: none; transition: opacity .2s; }
  .overlay.show { opacity: 1; pointer-events: auto; }
  .panel { position: fixed; top: 0; right: 0; height: 100vh; width: 420px; max-width: 100vw; background: #fff; z-index: 60; box-shadow: -4px 0 20px rgba(0,0,0,.15); transform: translateX(100%); transition: transform .25s; display: flex; flex-direction: column; }
  .panel.show { transform: translateX(0); }
  .panel-head { display: flex; align-items: center; justify-content: space-between; padding: 18px 22px; border-bottom: 1px solid #eee; }
  .panel-head h2 { margin: 0; font-size: 18px; }
  .panel-close { background: transparent; border: 0; font-size: 22px; }
  .panel-body { padding: 18px 22px; overflow-y: auto; flex: 1; }
  .panel-foot { padding: 18px 22px; border-top: 1px solid #eee; }

  /* ---- CART ITEMS ---- */
  .cart-row { display: grid; grid-template-columns: 60px 1fr auto; gap: 12px; padding: 12px 0; border-bottom: 1px solid #f3f3f3; }
  .cart-row img { width: 60px; height: 60px; object-fit: contain; background: #fafafa; border-radius: 6px; }
  .cart-info .nm { font-size: 13px; font-weight: 600; }
  .cart-info .sz { font-size: 12px; color: #888; margin-top: 2px; }
  .cart-info .pr { font-size: 13px; margin-top: 4px; }
  .stepper { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .stepper button { width: 24px; height: 24px; border: 1px solid #ddd; background: #fff; border-radius: 4px; font-size: 14px; line-height: 1; }
  .cart-remove { background: transparent; border: 0; color: #aaa; font-size: 18px; align-self: start; }
  .cart-remove:hover { color: #f5163f; }
  .total-row { display: flex; justify-content: space-between; margin-bottom: 12px; }
  .total-row.big { font-size: 18px; font-weight: 700; }
  .empty-state { text-align: center; color: #888; padding: 60px 20px; }

  /* ---- MODAL ---- */
  .modal { position: fixed; inset: 0; z-index: 70; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal.show { display: flex; }
  .modal-card { background: #fff; border-radius: 12px; padding: 28px; width: 100%; max-width: 380px; box-shadow: 0 12px 40px rgba(0,0,0,.2); }
  .modal-card h2 { margin: 0 0 16px; font-size: 20px; }
  .modal-card .form-row { margin-bottom: 12px; }
  .modal-card input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; }
  .modal-card input:focus { outline: 0; border-color: #16161a; }
  .modal-card .tabs-mini { display: flex; gap: 4px; margin-bottom: 16px; }
  .tabs-mini button { flex: 1; padding: 8px; border: 0; background: #f3f3f3; border-radius: 6px; }
  .tabs-mini button.active { background: #16161a; color: #fff; }
  .error { color: #f5163f; font-size: 13px; margin-top: 8px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #16161a; color: #fff; padding: 12px 20px; border-radius: 8px; z-index: 100; opacity: 0; transition: opacity .2s; }
  .toast.show { opacity: 1; }
  .toast.error { background: #f5163f; }

  /* checkout form */
  .co-form .form-row { margin-bottom: 12px; }
  .co-form input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; }
  .co-form input:focus { outline: 0; border-color: #16161a; }
  .addr-row { position: relative; }
  .suggest-dropdown { position: absolute; left: 0; right: 0; top: 100%; background: #fff; border: 1px solid #ddd; border-top: 0; border-radius: 0 0 8px 8px; max-height: 240px; overflow-y: auto; z-index: 5; display: none; box-shadow: 0 4px 12px rgba(0,0,0,.08); }
  .suggest-item { padding: 9px 12px; font-size: 13px; cursor: pointer; }
  .suggest-item:hover { background: #f5f5f5; }
  .field-error { color: #f5163f; font-size: 12px; margin-top: 4px; }

  /* ---- ORDERS LIST ---- */
  .order-row { padding: 16px 0; border-bottom: 1px solid #f3f3f3; }
  .order-head { display: flex; justify-content: space-between; font-weight: 600; }
  .order-meta { color: #888; font-size: 12px; margin: 4px 0 8px; }
  .order-item { display: flex; gap: 10px; font-size: 13px; padding: 4px 0; }
  .order-item img { width: 40px; height: 40px; object-fit: contain; background: #fafafa; border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="logo">STRIDE</div>
    <input class="search" placeholder="Поиск по кроссовкам, брендам, моделям" id="searchInput">
    <div class="top-actions">
      <button class="btn" id="ordersBtn" hidden>Мои заказы</button>
      <button class="btn" id="adminBtn" hidden>Админка</button>
      <button class="btn" id="loginBtn">Войти</button>
      <span class="btn" id="userLabel" hidden></span>
      <button class="btn" id="logoutBtn" hidden>Выйти</button>
      <button class="btn cart-btn" id="cartBtn">🛒 <span class="cart-badge" id="cartBadge" hidden>0</span></button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</header>

<main>
  <div class="meta" id="meta"></div>
  <div class="grid" id="grid"></div>
</main>

<!-- CART PANEL -->
<div class="overlay" id="overlay"></div>
<aside class="panel" id="cartPanel">
  <div class="panel-head">
    <h2 id="cartTitle">Корзина</h2>
    <button class="panel-close" data-close-panel>&times;</button>
  </div>
  <div class="panel-body" id="cartBody"></div>
  <div class="panel-foot" id="cartFoot" hidden></div>
</aside>

<!-- ORDERS PANEL -->
<aside class="panel" id="ordersPanel">
  <div class="panel-head">
    <h2>Мои заказы</h2>
    <button class="panel-close" data-close-panel>&times;</button>
  </div>
  <div class="panel-body" id="ordersBody"></div>
</aside>

<!-- LOGIN MODAL -->
<div class="modal" id="loginModal">
  <div class="modal-card">
    <h2 id="modalTitle">Вход</h2>
    <div class="tabs-mini">
      <button data-mode="login" class="active">Вход</button>
      <button data-mode="register">Регистрация</button>
    </div>
    <div class="form-row"><input id="emailInput" type="email" placeholder="Email"></div>
    <div class="form-row"><input id="passwordInput" type="password" placeholder="Пароль (мин. 8 символов)"></div>
    <button class="btn primary" id="submitAuth" style="width:100%;padding:10px">Войти</button>
    <div class="error" id="authError"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = "";
const state = {
  token: localStorage.getItem("stride_token") || null,
  user: null,
  products: [],
  cart: { items: [], total: 0, items_count: 0 },
  activeTab: "all",
  authMode: "login",
  selectedSize: {}, // productId -> size
};

const fmt = n => n.toLocaleString("ru-RU") + " ₽";

const TABS = [
  { key: "all",     label: "Все",        params: "" },
  { key: "kr",      label: "Кроссовки",  params: "?category=krossovki" },
  { key: "kedy",    label: "Кеды",       params: "?category=kedy" },
  { key: "botinki", label: "Ботинки",    params: "?category=botinki" },
  { key: "sale",    label: "Распродажа", params: "?only_discount=true", sale: true },
];

// -------------------- API helpers --------------------
async function api(path, opts = {}) {
  const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
  if (state.token) headers["Authorization"] = "Bearer " + state.token;
  const r = await fetch(API + path, { ...opts, headers });
  const text = await r.text();
  const body = text ? JSON.parse(text) : null;
  if (!r.ok) throw { status: r.status, body };
  return body;
}

// -------------------- TOAST --------------------
function toast(msg, isError = false) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.toggle("error", isError);
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// -------------------- AUTH --------------------
async function refreshUser() {
  if (!state.token) { state.user = null; renderTopbar(); return; }
  try {
    state.user = await api("/auth/me");
  } catch (e) {
    localStorage.removeItem("stride_token");
    state.token = null;
    state.user = null;
  }
  renderTopbar();
}

function renderTopbar() {
  const loginBtn = document.getElementById("loginBtn");
  const logoutBtn = document.getElementById("logoutBtn");
  const userLabel = document.getElementById("userLabel");
  const ordersBtn = document.getElementById("ordersBtn");
  const adminBtn = document.getElementById("adminBtn");

  if (state.user) {
    loginBtn.hidden = true;
    userLabel.hidden = false;
    userLabel.textContent = state.user.email || (state.user.first_name || "Вы");
    logoutBtn.hidden = false;
    ordersBtn.hidden = false;
    adminBtn.hidden = !state.user.is_admin;
  } else {
    loginBtn.hidden = false;
    userLabel.hidden = true;
    logoutBtn.hidden = true;
    ordersBtn.hidden = true;
    adminBtn.hidden = true;
  }
}

async function doAuth() {
  const email = document.getElementById("emailInput").value.trim();
  const password = document.getElementById("passwordInput").value;
  const err = document.getElementById("authError");
  err.textContent = "";

  if (!email || !password) { err.textContent = "Заполни email и пароль"; return; }

  try {
    const path = state.authMode === "register" ? "/auth/register" : "/auth/login";
    const res = await api(path, { method: "POST", body: JSON.stringify({ email, password }) });
    state.token = res.access_token;
    localStorage.setItem("stride_token", state.token);
    await refreshUser();
    await loadCart();
    closeLogin();
    toast(state.authMode === "register" ? "Регистрация успешна" : "Привет!");
  } catch (e) {
    err.textContent = (e.body && e.body.detail) || "Ошибка авторизации";
  }
}

function openLogin() { document.getElementById("loginModal").classList.add("show"); }
function closeLogin() {
  document.getElementById("loginModal").classList.remove("show");
  document.getElementById("authError").textContent = "";
}

// -------------------- CATALOG --------------------
function renderTabs() {
  document.getElementById("tabs").innerHTML = TABS.map(t =>
    `<button class="tab ${t.sale ? "sale-tab" : ""} ${state.activeTab === t.key ? "active" : ""}" data-tab="${t.key}">${t.label}</button>`
  ).join("");
}

async function loadCatalog() {
  const tab = TABS.find(t => t.key === state.activeTab);
  const sep = tab.params ? "&" : "?";
  const search = document.getElementById("searchInput").value.trim();
  const q = search ? `${sep}q=${encodeURIComponent(search)}` : "";
  const d = await api(`/products${tab.params}${q}${tab.params || q ? "&" : "?"}page_size=100`);
  state.products = d.items;
  document.getElementById("meta").textContent = `Найдено: ${d.total} ${ruPlural(d.total, "модель", "модели", "моделей")}`;
  renderGrid();
}

function ruPlural(n, one, few, many) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return one;
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return few;
  return many;
}

function renderGrid() {
  document.getElementById("grid").innerHTML = state.products.map(p => {
    const sel = state.selectedSize[p.id];
    return `
      <div class="card">
        <div class="thumb">
          ${p.discount_pct ? `<span class="disc">−${p.discount_pct}%</span>` : ""}
          <img src="${p.image_url}" alt="${p.name}" loading="lazy">
        </div>
        <div class="body">
          <div class="brand">${p.brand.name}</div>
          <div class="name">${p.name}</div>
          <div class="rating">★ ${p.rating.toFixed(1)}</div>
          <div class="sizes">
            ${p.sizes.map(s => `<button class="size-chip ${sel === s ? "active" : ""}" data-product="${p.id}" data-size="${s}">${s}</button>`).join("")}
          </div>
          <div class="price-row">
            <span class="price ${p.price_old ? "sale-price" : ""}">${fmt(p.price)}</span>
            ${p.price_old ? `<span class="price-old">${fmt(p.price_old)}</span>` : ""}
          </div>
          <button class="add-btn" data-add="${p.id}" ${sel ? "" : "disabled"}>${sel ? `В корзину (р. ${sel})` : "Выбери размер"}</button>
        </div>
      </div>
    `;
  }).join("");
}

// -------------------- CART --------------------
async function loadCart() {
  if (!state.token) {
    state.cart = { items: [], total: 0, items_count: 0 };
    renderCartBadge();
    return;
  }
  state.cart = await api("/cart");
  renderCartBadge();
}

function renderCartBadge() {
  const badge = document.getElementById("cartBadge");
  const n = state.cart.items_count;
  badge.textContent = n;
  badge.hidden = n === 0;
}

async function addToCart(productId) {
  if (!state.token) { openLogin(); return; }
  const size = state.selectedSize[productId];
  if (!size) { toast("Выбери размер", true); return; }
  try {
    state.cart = await api("/cart/items", {
      method: "POST",
      body: JSON.stringify({ product_id: productId, size, quantity: 1 }),
    });
    renderCartBadge();
    toast("Добавлено в корзину");
  } catch (e) {
    toast((e.body && e.body.detail) || "Ошибка", true);
  }
}

async function changeQty(itemId, delta) {
  const item = state.cart.items.find(i => i.id === itemId);
  if (!item) return;
  const newQty = item.quantity + delta;
  try {
    if (newQty <= 0) state.cart = await api(`/cart/items/${itemId}`, { method: "DELETE" });
    else state.cart = await api(`/cart/items/${itemId}`, { method: "PATCH", body: JSON.stringify({ quantity: newQty }) });
    renderCartBadge();
    renderCart();
  } catch (e) {
    toast((e.body && e.body.detail) || "Ошибка", true);
  }
}

async function removeCartItem(itemId) {
  try {
    state.cart = await api(`/cart/items/${itemId}`, { method: "DELETE" });
    renderCartBadge();
    renderCart();
  } catch (e) { toast("Ошибка", true); }
}

function openCart() {
  if (!state.token) { openLogin(); return; }
  document.getElementById("overlay").classList.add("show");
  document.getElementById("cartPanel").classList.add("show");
  renderCart();
}

function renderCart() {
  document.getElementById("cartTitle").textContent = "Корзина";
  const body = document.getElementById("cartBody");
  const foot = document.getElementById("cartFoot");
  if (!state.cart.items.length) {
    body.innerHTML = '<div class="empty-state">Корзина пуста.<br>Добавь что-нибудь из каталога ☝️</div>';
    foot.hidden = true;
    return;
  }
  body.innerHTML = state.cart.items.map(i => `
    <div class="cart-row">
      <img src="${i.product.image_url}" alt="">
      <div class="cart-info">
        <div class="nm">${i.product.brand.name} · ${i.product.name}</div>
        <div class="sz">размер ${i.size}</div>
        <div class="pr">${fmt(i.product.price)} × ${i.quantity} = ${fmt(i.subtotal)}</div>
        <div class="stepper">
          <button data-dec="${i.id}">−</button>
          <span>${i.quantity}</span>
          <button data-inc="${i.id}">+</button>
        </div>
      </div>
      <button class="cart-remove" data-rm="${i.id}">×</button>
    </div>
  `).join("");
  foot.hidden = false;
  foot.innerHTML = `
    <div class="total-row big"><span>Итого</span><span>${fmt(state.cart.total)}</span></div>
    <button class="btn primary" id="checkoutBtn" style="width:100%;padding:12px;font-size:15px">Оформить заказ</button>
  `;
}

function renderCheckout() {
  document.getElementById("cartTitle").textContent = "Оформление";
  document.getElementById("cartBody").innerHTML = `
    <div class="co-form">
      <div class="form-row"><input id="coName" placeholder="Имя получателя"></div>
      <div class="form-row"><input id="coPhone" type="tel" placeholder="+7 (9XX) XXX-XX-XX"></div>
      <div class="form-row">
        <input id="coAddress" placeholder="Москва, ул. Тверская, д. 1, кв. 5" autocomplete="off">
      </div>
      <div class="error" id="coError"></div>
    </div>
  `;
  document.getElementById("cartFoot").innerHTML = `
    <div class="total-row big"><span>К оплате</span><span>${fmt(state.cart.total)}</span></div>
    <div style="display:flex;gap:8px">
      <button class="btn" id="backToCart" style="flex:1;padding:12px">← Назад</button>
      <button class="btn primary" id="confirmOrder" style="flex:2;padding:12px;font-size:15px">Перейти к оплате</button>
    </div>
  `;
  maskPhone(document.getElementById("coPhone"));
}

function maskPhone(input) {
  // "Ленивое" форматирование: закрывающую скобку и тире добавляем только если
  // за ними есть цифры. Иначе backspace застревает на разделителях.
  const apply = () => {
    let d = input.value.replace(/\D/g, "");
    if (!d) { input.value = ""; return; }
    if (d.startsWith("8")) d = "7" + d.slice(1);
    if (!d.startsWith("7")) d = "7" + d;
    d = d.slice(0, 11);

    const p1 = d.slice(1, 4);
    const p2 = d.slice(4, 7);
    const p3 = d.slice(7, 9);
    const p4 = d.slice(9, 11);

    let s = "+7";
    if (p1) s += " (" + p1;
    if (p2) s += ") " + p2;
    if (p3) s += "-" + p3;
    if (p4) s += "-" + p4;

    input.value = s;
  };
  input.addEventListener("input", apply);
  input.addEventListener("keydown", (e) => {
    // если в поле остался только "+7" — backspace очищает полностью
    if (e.key === "Backspace" && (input.value === "+7" || input.value === "")) {
      input.value = "";
      e.preventDefault();
    }
  });
}

async function submitOrder() {
  const name = document.getElementById("coName").value.trim();
  const phone = document.getElementById("coPhone").value.trim();
  const address = document.getElementById("coAddress").value.trim();
  const err = document.getElementById("coError");
  err.textContent = "";

  if (name.length < 2) { err.textContent = "Укажите имя получателя"; return; }
  const digits = phone.replace(/\D/g, "");
  if (digits.length !== 11 || (digits[0] !== "7" && digits[0] !== "8") || digits[1] !== "9") {
    err.textContent = "Введите мобильный номер: +7 9XX XXX-XX-XX";
    return;
  }
  if (address.length < 5) { err.textContent = "Укажите адрес доставки"; return; }

  try {
    const res = await api("/orders", {
      method: "POST",
      body: JSON.stringify({ delivery_name: name, delivery_phone: phone, delivery_address: address }),
    });
    await loadCart();
    closeCart();
    location.href = res.payment_url;
  } catch (e) {
    let msg = "Ошибка оформления";
    if (e.body && e.body.detail) {
      msg = Array.isArray(e.body.detail) ? e.body.detail.map(x => x.msg).join("; ") : e.body.detail;
    }
    err.textContent = msg;
  }
}

function closeCart() {
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("cartPanel").classList.remove("show");
  document.getElementById("ordersPanel").classList.remove("show");
}

// -------------------- ORDERS --------------------
async function openOrders() {
  if (!state.token) { openLogin(); return; }
  document.getElementById("overlay").classList.add("show");
  document.getElementById("ordersPanel").classList.add("show");
  try {
    const list = await api("/orders");
    const body = document.getElementById("ordersBody");
    if (!list.length) { body.innerHTML = '<div class="empty-state">Заказов ещё нет</div>'; return; }
    body.innerHTML = list.map(o => `
      <div class="order-row">
        <div class="order-head"><span>Заказ #${o.id}</span><span>${fmt(o.total_amount)}</span></div>
        <div class="order-meta">${o.status} · ${new Date(o.created_at).toLocaleString("ru-RU")}</div>
        <div class="order-meta">→ ${o.delivery_name}, ${o.delivery_phone}, ${o.delivery_address}</div>
        ${o.items.map(i => `
          <div class="order-item">
            <img src="${i.product_image}" alt="">
            <div><div>${i.product_name} (р. ${i.size})</div><div style="color:#888">${fmt(i.unit_price)} × ${i.quantity} = ${fmt(i.subtotal)}</div></div>
          </div>
        `).join("")}
      </div>
    `).join("");
  } catch (e) { toast("Не удалось загрузить заказы", true); }
}

// -------------------- EVENT WIRING --------------------
document.getElementById("loginBtn").onclick = openLogin;
document.getElementById("logoutBtn").onclick = () => {
  state.token = null; state.user = null;
  localStorage.removeItem("stride_token");
  state.cart = { items: [], total: 0, items_count: 0 };
  renderTopbar(); renderCartBadge();
  toast("Вы вышли");
};
document.getElementById("cartBtn").onclick = openCart;
document.getElementById("ordersBtn").onclick = openOrders;
document.getElementById("adminBtn").onclick = () => location.href = "/static/admin.html";
document.getElementById("submitAuth").onclick = doAuth;
document.getElementById("overlay").onclick = closeCart;

document.querySelectorAll(".tabs-mini button").forEach(b => b.onclick = () => {
  state.authMode = b.dataset.mode;
  document.querySelectorAll(".tabs-mini button").forEach(x => x.classList.toggle("active", x.dataset.mode === state.authMode));
  document.getElementById("modalTitle").textContent = state.authMode === "register" ? "Регистрация" : "Вход";
  document.getElementById("submitAuth").textContent = state.authMode === "register" ? "Зарегистрироваться" : "Войти";
});

document.getElementById("loginModal").onclick = (e) => { if (e.target.id === "loginModal") closeLogin(); };

document.getElementById("tabs").addEventListener("click", e => {
  const k = e.target.dataset.tab;
  if (!k) return;
  state.activeTab = k;
  renderTabs();
  loadCatalog();
});

document.getElementById("grid").addEventListener("click", e => {
  const ps = e.target.dataset.product;
  if (ps) {
    state.selectedSize[+ps] = +e.target.dataset.size;
    renderGrid();
    return;
  }
  const add = e.target.dataset.add;
  if (add) addToCart(+add);
});

document.getElementById("cartBody").addEventListener("click", e => {
  if (e.target.dataset.inc) changeQty(+e.target.dataset.inc, +1);
  if (e.target.dataset.dec) changeQty(+e.target.dataset.dec, -1);
  if (e.target.dataset.rm) removeCartItem(+e.target.dataset.rm);
});

document.getElementById("cartFoot").addEventListener("click", e => {
  if (e.target.id === "checkoutBtn") renderCheckout();
  if (e.target.id === "backToCart") renderCart();
  if (e.target.id === "confirmOrder") submitOrder();
});

document.querySelectorAll("[data-close-panel]").forEach(b => b.onclick = closeCart);

let searchTimer;
document.getElementById("searchInput").addEventListener("input", () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(loadCatalog, 300);
});

document.getElementById("passwordInput").addEventListener("keydown", e => { if (e.key === "Enter") doAuth(); });

// -------------------- INIT --------------------
(async () => {
  renderTabs();
  await refreshUser();
  await Promise.all([loadCatalog(), loadCart()]);
  // если пришли из payment.html по ссылке "Мои заказы" — открыть панель сразу
  if (new URLSearchParams(location.search).get("orders") === "1") {
    openOrders();
    history.replaceState({}, "", location.pathname);
  }
})();
</script>
</body>
</html>
